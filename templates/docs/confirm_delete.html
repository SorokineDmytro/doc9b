{% extends "base.html" %}

{% block title %}Supprimer {{ object_type }} - Doc9b{% endblock title %}

{% block content %}
  <h2>Confirmer la suppression</h2>
  <p>Voulez-vous vraiment supprimer <strong>{{ object_type }} {{ object_name }}</strong> ?</p>
  <p>Cette action est irréversible.</p>

  <form method="post">
    {% csrf_token %}
    <div class="flex_row">
        <a href="{% url 'docs:space_details' space.slug %}" class="action-button">Annuler</a>
        <button type="submit" class="danger-button">Supprimer</button>
    </div>
  </form>
{% endblock content %}
